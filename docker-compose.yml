services:
  backend:
    build: ./backend
    container_name: assistant-backend
    ports:
      - "8000:8000"
    volumes:
      # Persist ChromaDB data (generated by build_vector_store.py)
      - ./chroma_data:/app/chroma_data
      # Persist application logs
      - ./backend/app/data/logs:/app/app/data/logs
      # Mount trained model (so you don't have to rebuild image for model updates)
      - ./backend/app/models/priority_classifier.pkl:/app/app/models/priority_classifier.pkl
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.1-8b-instant}
      - CHROMA_PERSIST_DIR=/app/chroma_data
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - TOP_K_RESULTS=3
      - SIMILARITY_THRESHOLD=0.5
      - LOG_LEVEL=INFO
    env_file:
      - .env
    networks:
      - assistant-network
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: assistant-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    networks:
      - assistant-network
    restart: unless-stopped

networks:
  assistant-network:
    driver: bridge